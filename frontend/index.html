<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pre-meeting-intel</title>
</head>
<body>
    <h1>Pre-Meeting Intelligence</h1>

    <input type="text" id="company" placeholder="Company name...">
    <button onclick="generateBriefing()">Generate Briefing</button>

    <div id="output"></div>

    <script>
        async function generateBriefing() {
            const company = document.getElementById('company').value;
            const output = document.getElementById('output');
            
            output.textContent = "Loading...";

            const response = await fetch("/briefing/stream", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                // Zmień body - /briefing/stream przyjmuje company_name nie query
                body: JSON.stringify({company_name: company})
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            output.textContent = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                output.textContent += decoder.decode(value);
            }
        }
    </script>
</body>
</html>
