<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pre-meeting-intel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f1b2d;
            color: #e8edf5;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #7eb8f7;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        p.subtitle {
            color: #8a9bb5;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .form-container {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 680px;
            margin-bottom: 32px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background-color: #1a2d45;
            border: 1px solid #2d4a6e;
            border-radius: 8px;
            color: #e8edf5;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #7eb8f7;
        }

        input[type="text"]::placeholder {
            color: #4a6080;
        }

        button {
            padding: 12px 24px;
            background-color: #1e5fa8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background-color: #2673c8;
        }

        button:disabled {
            background-color: #1a3a5c;
            cursor: not-allowed;
            color: #4a6080;
        }

        #output {
            width: 100%;
            max-width: 680px;
            background-color: #1a2d45;
            border: 1px solid #2d4a6e;
            border-radius: 8px;
            padding: 24px;
            min-height: 100px;
            line-height: 1.7;
            font-size: 0.95rem;
            white-space: pre-wrap;
            color: #c8d8ec;
        }
    </style>

</head>
<body>
    <h1>Pre-Meeting Intelligence</h1>
    <p class="subtitle">AI-powered briefings before your enterprise meetings</p>

    <div class="form-container">
        <input type="text" id="company" placeholder="Enter company name...">
        <button onclick="generateBriefing()">Generate Briefing</button>
    </div>

    <div id="output"></div>

    <script>
        async function generateBriefing() {
            const company = document.getElementById('company').value;
            const output = document.getElementById('output');
            
            output.textContent = "Loading...";

            const response = await fetch("/briefing/stream", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                // Zmień body - /briefing/stream przyjmuje company_name nie query
                body: JSON.stringify({company_name: company})
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            output.textContent = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                output.textContent += decoder.decode(value);
            }
        }
    </script>
</body>
</html>
